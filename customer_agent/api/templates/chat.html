<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能客服</title>
    <style>
        :root {
            --bg: #f4f6f8;
            --surface: #ffffff;
            --surface-muted: #f8fafc;
            --surface-tint: #eef7f5;
            --ink: #172033;
            --muted: #617084;
            --subtle: #8794a8;
            --line: #d8e1ec;
            --line-strong: #c6d1df;
            --primary: #0f766e;
            --primary-strong: #0b5f59;
            --primary-soft: #dff7f3;
            --accent: #a8550b;
            --accent-soft: #fff4e6;
            --danger: #b42318;
            --danger-soft: #fff1f0;
            --ok: #138a43;
            --shadow: 0 18px 44px rgba(23, 32, 51, 0.12);
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background: var(--bg);
            color: var(--ink);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            font-size: 16px;
            line-height: 1.5;
        }

        body {
            min-height: 100dvh;
        }

        button,
        textarea {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        button:disabled,
        textarea:disabled {
            cursor: not-allowed;
        }

        a {
            color: var(--primary-strong);
        }

        .page {
            min-height: 100dvh;
            display: grid;
            grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
        }

        .side {
            background: #162233;
            color: #eff6ff;
            padding: 26px 22px;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: var(--radius);
            background: #20b8a8;
            color: #062d2a;
            display: grid;
            place-items: center;
            font-weight: 800;
            letter-spacing: 0;
        }

        .brand-title {
            font-size: 18px;
            font-weight: 700;
        }

        .brand-subtitle {
            color: #b9c7d8;
            font-size: 13px;
            margin-top: 2px;
        }

        .side-section {
            display: grid;
            gap: 10px;
        }

        .side-heading {
            margin: 0;
            color: #dce8f7;
            font-size: 13px;
            font-weight: 700;
        }

        .suggestions {
            display: grid;
            gap: 10px;
        }

        .suggestion {
            min-height: 44px;
            border: 1px solid rgba(226, 232, 240, 0.18);
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.06);
            color: #f8fafc;
            padding: 10px 12px;
            text-align: left;
            transition: background 160ms ease, border-color 160ms ease;
        }

        .suggestion:hover,
        .suggestion:focus-visible {
            background: rgba(32, 184, 168, 0.18);
            border-color: rgba(32, 184, 168, 0.76);
            outline: none;
        }

        .session-box {
            border: 1px solid rgba(226, 232, 240, 0.18);
            border-radius: var(--radius);
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            display: grid;
            gap: 10px;
        }

        .session-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            color: #cbd5e1;
            font-size: 13px;
        }

        .session-row strong {
            color: #ffffff;
            font-weight: 650;
            overflow-wrap: anywhere;
            text-align: right;
        }

        .user-id-form {
            min-height: 44px;
            display: grid;
            grid-template-columns: auto minmax(110px, 150px) auto;
            align-items: end;
            gap: 8px;
            padding: 6px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--surface);
        }

        .user-id-form label {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
            align-self: center;
            white-space: nowrap;
        }

        .user-id-form input {
            width: 100%;
            min-height: 36px;
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 0 10px;
            color: var(--ink);
            background: var(--surface-muted);
            font: inherit;
        }

        .user-id-form input:focus {
            border-color: var(--primary);
            outline: 3px solid rgba(15, 118, 110, 0.16);
        }

        .user-id-form button {
            min-height: 36px;
            border: 0;
            border-radius: 6px;
            background: var(--primary);
            color: #ffffff;
            padding: 0 12px;
            font-weight: 700;
        }

        .user-id-form button:hover,
        .user-id-form button:focus-visible {
            background: var(--primary-strong);
            outline: 3px solid rgba(15, 118, 110, 0.16);
        }

        .side-actions {
            margin-top: auto;
            display: grid;
            gap: 10px;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #dbeafe;
            font-size: 13px;
        }

        .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #f59e0b;
            flex: 0 0 auto;
        }

        .dot.connected {
            background: #22c55e;
        }

        .dot.error {
            background: var(--danger);
        }

        .side-button {
            min-height: 44px;
            border: 1px solid rgba(226, 232, 240, 0.18);
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.08);
            color: #f8fafc;
            padding: 0 12px;
            text-align: center;
        }

        .side-button:hover,
        .side-button:focus-visible {
            border-color: rgba(32, 184, 168, 0.76);
            outline: 3px solid rgba(32, 184, 168, 0.2);
        }

        .chat-shell {
            min-width: 0;
            height: 100dvh;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
        }

        .topbar {
            background: rgba(255, 255, 255, 0.92);
            border-bottom: 1px solid var(--line);
            padding: 16px 26px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            backdrop-filter: blur(14px);
        }

        .topbar h1 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 0;
            line-height: 1.3;
        }

        .topbar p {
            margin: 3px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .chip {
            min-height: 36px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--surface-muted);
            color: var(--muted);
            padding: 7px 12px;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .action-button {
            min-height: 44px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--ink);
            padding: 0 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-button.primary {
            border-color: transparent;
            background: var(--primary);
            color: #ffffff;
            font-weight: 700;
        }

        .action-button.danger {
            border-color: #f3c2bd;
            color: var(--danger);
            background: var(--danger-soft);
        }

        .action-button:hover,
        .action-button:focus-visible {
            border-color: var(--primary);
            outline: 3px solid rgba(15, 118, 110, 0.16);
        }

        .action-button.primary:hover,
        .action-button.primary:focus-visible {
            background: var(--primary-strong);
        }

        .action-button:disabled {
            opacity: 0.52;
        }

        .messages {
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }

        .welcome {
            max-width: 760px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--surface);
            padding: 20px;
            box-shadow: 0 12px 30px rgba(23, 32, 51, 0.07);
        }

        .welcome h2 {
            margin: 0 0 8px;
            font-size: 18px;
        }

        .welcome p {
            margin: 0;
            color: var(--muted);
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 900px;
            animation: fadeUp 180ms ease-out;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: var(--radius);
            display: grid;
            place-items: center;
            flex: 0 0 auto;
            font-size: 13px;
            font-weight: 700;
        }

        .bot .avatar {
            background: var(--primary-soft);
            color: var(--primary-strong);
        }

        .user .avatar {
            background: #e8eef8;
            color: #1e293b;
        }

        .message-body {
            min-width: 0;
            display: grid;
            gap: 8px;
        }

        .user .message-body {
            justify-items: end;
        }

        .bubble {
            border-radius: var(--radius);
            padding: 13px 15px;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            max-width: min(760px, 100%);
        }

        .bot .bubble {
            background: var(--surface);
            border: 1px solid var(--line);
            box-shadow: 0 10px 24px rgba(23, 32, 51, 0.06);
        }

        .bot.error .bubble {
            background: var(--danger-soft);
            border-color: #efc1bb;
            color: #7a1d16;
        }

        .user .bubble {
            background: var(--primary);
            color: #ffffff;
            border: 1px solid var(--primary);
        }

        .message-time {
            color: var(--subtle);
            font-size: 12px;
        }

        .message-actions,
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .mini-button,
        .quick-reply {
            min-height: 36px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--ink);
            padding: 0 11px;
            font-size: 13px;
        }

        .mini-button:hover,
        .mini-button:focus-visible,
        .quick-reply:hover,
        .quick-reply:focus-visible {
            border-color: var(--primary);
            outline: 3px solid rgba(15, 118, 110, 0.14);
        }

        .quick-reply {
            background: var(--surface-tint);
            color: var(--primary-strong);
            border-color: #b9e4dd;
            font-weight: 650;
        }

        .meta-block {
            display: grid;
            gap: 10px;
            max-width: min(760px, 100%);
        }

        .images {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(132px, 180px));
            gap: 10px;
        }

        .images a {
            display: block;
            aspect-ratio: 4 / 3;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--line);
            background: var(--surface-muted);
        }

        .images img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .image-fallback {
            display: none;
            min-height: 100%;
            padding: 10px;
            color: var(--muted);
            font-size: 12px;
            overflow-wrap: anywhere;
            align-items: center;
        }

        .image-link.image-missing img {
            display: none;
        }

        .image-link.image-missing .image-fallback {
            display: flex;
        }

        .citations {
            display: grid;
            gap: 8px;
        }

        .citation {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--surface-muted);
            padding: 10px 12px;
        }

        .citation-title {
            display: flex;
            gap: 8px;
            align-items: baseline;
            font-weight: 700;
        }

        .citation-index {
            color: var(--accent);
            font-size: 12px;
            font-weight: 800;
        }

        .citation a {
            color: var(--primary-strong);
            text-decoration: none;
        }

        .citation a:hover,
        .citation a:focus-visible {
            text-decoration: underline;
            outline: none;
        }

        .citation p {
            margin: 5px 0 0;
            color: var(--muted);
            font-size: 13px;
        }

        .details {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--surface-muted);
            padding: 8px 10px;
            color: var(--muted);
            font-size: 13px;
        }

        .details summary {
            cursor: pointer;
            color: var(--ink);
            font-weight: 650;
        }

        .detail-grid {
            margin-top: 8px;
            display: grid;
            grid-template-columns: max-content minmax(0, 1fr);
            gap: 5px 12px;
        }

        .detail-grid code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            color: var(--muted);
            overflow-wrap: anywhere;
        }

        .typing-dots {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--subtle);
            animation: bounce 1.2s infinite ease-in-out;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 140ms;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 280ms;
        }

        @keyframes bounce {
            0%,
            80%,
            100% {
                transform: translateY(0);
                opacity: 0.52;
            }
            40% {
                transform: translateY(-4px);
                opacity: 1;
            }
        }

        .composer {
            border-top: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.94);
            padding: 14px 26px 18px;
            backdrop-filter: blur(14px);
        }

        .composer-inner {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: end;
            max-width: 980px;
            margin: 0 auto;
        }

        label {
            display: block;
            margin-bottom: 7px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 650;
        }

        textarea {
            width: 100%;
            min-height: 54px;
            max-height: 170px;
            resize: vertical;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 13px 14px;
            color: var(--ink);
            background: var(--surface);
        }

        textarea:focus {
            border-color: var(--primary);
            outline: 3px solid rgba(15, 118, 110, 0.16);
        }

        .send {
            min-width: 110px;
            min-height: 54px;
            border: 0;
            border-radius: var(--radius);
            background: var(--primary);
            color: #ffffff;
            font-weight: 800;
            padding: 0 18px;
        }

        .send:hover,
        .send:focus-visible {
            background: var(--primary-strong);
            outline: 3px solid rgba(15, 118, 110, 0.18);
        }

        .send:disabled {
            opacity: 0.52;
        }

        .composer-status {
            min-height: 22px;
            max-width: 980px;
            margin: 8px auto 0;
            color: var(--muted);
            font-size: 13px;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 22px;
            transform: translateX(-50%);
            z-index: 20;
            min-height: 42px;
            max-width: min(520px, calc(100vw - 28px));
            border-radius: var(--radius);
            border: 1px solid var(--line-strong);
            background: var(--surface);
            color: var(--ink);
            box-shadow: var(--shadow);
            padding: 10px 14px;
            display: none;
        }

        .toast.show {
            display: block;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 980px) {
            .page {
                grid-template-columns: minmax(220px, 280px) minmax(0, 1fr);
            }

            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .top-actions {
                justify-content: flex-start;
            }

            .user-id-form {
                width: 100%;
                grid-template-columns: auto minmax(0, 1fr) auto;
            }
        }

        @media (max-width: 760px) {
            .page {
                display: block;
            }

            .side {
                display: none;
            }

            .chat-shell {
                height: 100dvh;
            }

            .topbar {
                padding: 14px 14px;
            }

            .topbar h1 {
                font-size: 18px;
            }

            .chip {
                max-width: 100%;
            }

            .action-button {
                min-width: 44px;
                padding: 0 11px;
            }

            .user-id-form {
                grid-template-columns: minmax(0, 1fr) auto;
            }

            .user-id-form label {
                grid-column: 1 / -1;
            }

            .messages {
                padding: 18px 12px;
                gap: 15px;
            }

            .message {
                max-width: 100%;
                gap: 9px;
            }

            .avatar {
                width: 32px;
                height: 32px;
            }

            .bubble,
            .meta-block {
                max-width: 100%;
            }

            .composer {
                padding: 12px 12px 14px;
            }

            .composer-inner {
                grid-template-columns: minmax(0, 1fr);
            }

            .send {
                width: 100%;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                scroll-behavior: auto !important;
                transition: none !important;
                animation: none !important;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <aside class="side" aria-label="服务信息">
            <div class="brand">
                <div class="brand-mark" aria-hidden="true">AI</div>
                <div>
                    <div class="brand-title">智能客服</div>
                    <div class="brand-subtitle">知识库问答</div>
                </div>
            </div>

            <section class="side-section">
                <h2 class="side-heading">常用问题</h2>
                <div class="suggestions">
                    <button class="suggestion" type="button">介绍一下华为擎云B730计算机</button>
                    <button class="suggestion" type="button">这款产品适合什么办公场景？</button>
                    <button class="suggestion" type="button">它有哪些主要配置？</button>
                    <button class="suggestion" type="button">售后服务和保修政策是什么？</button>
                </div>
            </section>

            <section class="side-section">
                <h2 class="side-heading">当前会话</h2>
                <div class="session-box">
                    <div class="session-row"><span>状态</span><strong id="sideStatusText">连接中</strong></div>
                    <div class="session-row"><span>会话</span><strong id="sideSessionLabel"></strong></div>
                    <div class="session-row"><span>用户</span><strong id="currentUserLabel">未设置</strong></div>
                    <div class="session-row"><span>历史</span><strong id="historyState">加载中</strong></div>
                </div>
            </section>

            <div class="side-actions">
                <span class="status"><span id="statusDot" class="dot" aria-hidden="true"></span><span id="statusText">连接中</span></span>
                <button id="sideNewChatBtn" class="side-button" type="button">新会话</button>
                <button id="sideClearBtn" class="side-button" type="button">清空当前会话</button>
            </div>
        </aside>

        <section class="chat-shell" aria-label="聊天">
            <header class="topbar">
                <div>
                    <h1>您好，请问需要了解什么？</h1>
                    <p>客服会基于知识库返回回答、参考来源和相关图片。</p>
                </div>
                <div class="top-actions">
                    <span id="healthChip" class="chip"><span class="dot" aria-hidden="true"></span><span>服务检查中</span></span>
                    <form id="userIdForm" class="user-id-form">
                        <label for="userIdInput">用户ID</label>
                        <input id="userIdInput" name="user_id" type="text" inputmode="numeric" autocomplete="off" placeholder="例如 1001">
                        <button id="setUserIdBtn" type="submit">设置</button>
                    </form>
                    <button id="retryBtn" class="action-button" type="button" disabled>重试</button>
                    <button id="clearBtn" class="action-button danger" type="button">清空</button>
                    <button id="newChatBtn" class="action-button primary" type="button">新会话</button>
                </div>
            </header>

            <div id="messages" class="messages" aria-live="polite">
                <section class="welcome">
                    <h2>智能客服已就绪</h2>
                    <p>你可以咨询产品介绍、配置参数、使用场景和售后服务等问题。</p>
                </section>
            </div>

            <form id="composer" class="composer">
                <div class="composer-inner">
                    <div>
                        <label for="messageInput">输入问题</label>
                        <textarea id="messageInput" rows="2" placeholder="例如：介绍一下华为擎云B730计算机" autocomplete="off"></textarea>
                    </div>
                    <button id="sendBtn" class="send" type="submit">发送</button>
                </div>
                <div id="composerStatus" class="composer-status" role="status" aria-live="polite"></div>
            </form>
        </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script>
        const STORAGE_KEY = "customer_chat_session_id";
        const USER_ID_STORAGE_KEY = "customer_chat_user_id";
        const DEFAULT_USER_ID = "1001";
        const REQUEST_NOTICE_MS = 18000;
        const REQUEST_TIMEOUT_MS = 90000;

        const messagesEl = document.getElementById("messages");
        const composer = document.getElementById("composer");
        const input = document.getElementById("messageInput");
        const sendBtn = document.getElementById("sendBtn");
        const composerStatus = document.getElementById("composerStatus");
        const statusDot = document.getElementById("statusDot");
        const statusText = document.getElementById("statusText");
        const sideStatusText = document.getElementById("sideStatusText");
        const sideSessionLabel = document.getElementById("sideSessionLabel");
        const currentUserLabel = document.getElementById("currentUserLabel");
        const historyState = document.getElementById("historyState");
        const healthChip = document.getElementById("healthChip");
        const userIdForm = document.getElementById("userIdForm");
        const userIdInput = document.getElementById("userIdInput");
        const setUserIdBtn = document.getElementById("setUserIdBtn");
        const newChatBtn = document.getElementById("newChatBtn");
        const sideNewChatBtn = document.getElementById("sideNewChatBtn");
        const clearBtn = document.getElementById("clearBtn");
        const sideClearBtn = document.getElementById("sideClearBtn");
        const retryBtn = document.getElementById("retryBtn");
        const suggestions = document.querySelectorAll(".suggestion");
        const toast = document.getElementById("toast");

        let socket = null;
        let reconnectTimer = null;
        let awaiting = false;
        let pendingEl = null;
        let noticeTimer = null;
        let timeoutTimer = null;
        let lastQuestion = "";
        let sessionId = getOrCreateSessionId();
        let currentUserId = localStorage.getItem(USER_ID_STORAGE_KEY) || DEFAULT_USER_ID;
        if (currentUserId === "1") {
            currentUserId = DEFAULT_USER_ID;
            localStorage.setItem(USER_ID_STORAGE_KEY, currentUserId);
        }

        updateSessionLabels();
        updateUserLabel();
        loadHistory();
        connectSocket();
        refreshHealth();
        window.setInterval(refreshHealth, 15000);
        window.setTimeout(() => input.focus(), 150);

        composer.addEventListener("submit", (event) => {
            event.preventDefault();
            sendCurrentInput();
        });

        input.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendCurrentInput();
            }
        });

        suggestions.forEach((button) => {
            button.addEventListener("click", () => {
                const text = button.textContent.trim();
                input.value = text;
                input.focus();
                sendText(text);
            });
        });

        userIdForm.addEventListener("submit", (event) => {
            event.preventDefault();
            setUserId();
        });

        newChatBtn.addEventListener("click", startNewSession);
        sideNewChatBtn.addEventListener("click", startNewSession);
        clearBtn.addEventListener("click", clearCurrentSession);
        sideClearBtn.addEventListener("click", clearCurrentSession);
        retryBtn.addEventListener("click", () => {
            if (lastQuestion && !awaiting) {
                sendText(lastQuestion);
            }
        });

        function getOrCreateSessionId() {
            const existing = localStorage.getItem(STORAGE_KEY);
            if (existing) return existing;
            const created = makeSessionId();
            localStorage.setItem(STORAGE_KEY, created);
            return created;
        }

        function makeSessionId() {
            return "chat-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
        }

        function shortSessionId(value) {
            return value.replace(/^chat-/, "#");
        }

        function updateSessionLabels() {
            const label = shortSessionId(sessionId);
            sideSessionLabel.textContent = label;
        }

        function updateUserLabel() {
            userIdInput.value = currentUserId;
            currentUserLabel.textContent = currentUserId || "未设置";
        }

        function setStatus(state, text) {
            statusDot.className = "dot" + (state ? " " + state : "");
            statusText.textContent = text;
            sideStatusText.textContent = text;
        }

        function setHealth(ok, text) {
            const dot = healthChip.querySelector(".dot");
            const label = healthChip.querySelector("span:last-child");
            dot.className = "dot" + (ok ? " connected" : " error");
            label.textContent = text;
        }

        function sendControlMessage(text) {
            const payload = {
                type: "message",
                sender_id: sessionId,
                message: text
            };
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify(payload));
                return true;
            }
            return false;
        }

        async function setUserId() {
            const value = userIdInput.value.trim();
            if (!value) {
                showToast("请输入用户ID");
                userIdInput.focus();
                return;
            }

            currentUserId = value;
            localStorage.setItem(USER_ID_STORAGE_KEY, value);
            updateUserLabel();
            setUserIdBtn.disabled = true;

            const payload = `/SetSlots(user_id=${escapeSlotValue(value)})`;
            try {
                if (sendControlMessage(payload)) {
                    showToast(`用户ID已设置为 ${value}`);
                } else {
                    const response = await fetch("/api/messages", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            sender: sessionId,
                            message: payload,
                            metadata: { source: "chat_page", control: "set_user_id" }
                        })
                    });
                    if (!response.ok) throw new Error(await response.text());
                    showToast(`用户ID已设置为 ${value}`);
                    connectSocket();
                }
                window.setTimeout(() => loadHistory(false), 300);
            } catch (error) {
                showToast("用户ID设置失败");
            } finally {
                setUserIdBtn.disabled = false;
                input.focus();
            }
        }

        function applyCurrentUserId() {
            const storedUserId = localStorage.getItem(USER_ID_STORAGE_KEY);
            currentUserId = (!storedUserId || storedUserId === "1") ? DEFAULT_USER_ID : storedUserId;
            localStorage.setItem(USER_ID_STORAGE_KEY, currentUserId);
            updateUserLabel();
            sendControlMessage(`/SetSlots(user_id=${escapeSlotValue(currentUserId)})`);
        }

        function escapeSlotValue(value) {
            const text = String(value);
            if (/^[0-9A-Za-z_-]+$/.test(text)) return text;
            return `"${text.replaceAll("\\", "\\\\").replaceAll('"', '\\"')}"`;
        }

        async function refreshHealth() {
            try {
                const response = await fetch("/health", { cache: "no-store" });
                if (!response.ok) throw new Error("health failed");
                const data = await response.json();
                setHealth(Boolean(data.agent_ready), data.agent_ready ? "服务可用" : "服务未就绪");
            } catch (error) {
                setHealth(false, "服务不可用");
            }
        }

        function connectSocket() {
            if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) {
                return;
            }

            if (reconnectTimer) {
                window.clearTimeout(reconnectTimer);
                reconnectTimer = null;
            }

            setStatus("", "连接中");
            const protocol = location.protocol === "https:" ? "wss" : "ws";
            socket = new WebSocket(`${protocol}://${location.host}/api/stream`);

            socket.onopen = () => {
                setStatus("connected", "在线");
                socket.send(JSON.stringify({ type: "connect", session_id: sessionId }));
                applyCurrentUserId();
            };

            socket.onmessage = (event) => {
                let payload;
                try {
                    payload = JSON.parse(event.data);
                } catch (error) {
                    return;
                }

                if (payload.type === "connected") {
                    setStatus("connected", "在线");
                    return;
                }

                if (payload.type === "bot_response") {
                    finishAwaiting();
                    const messages = Array.isArray(payload.data) ? payload.data : [];
                    if (!messages.length) {
                        addMessage({ text: "本次没有返回可展示的回复，请换一种问法再试。" }, "bot", true);
                    } else {
                        messages.forEach((message) => addMessage(normalizeBotMessage(message), "bot"));
                    }
                    loadHistory(false);
                    return;
                }

                if (payload.type === "error") {
                    finishAwaiting();
                    addMessage({ text: payload.message || "服务暂时不可用，请稍后重试。" }, "bot", true);
                }
            };

            socket.onclose = () => {
                setStatus("", "已断开");
                if (awaiting) {
                    finishAwaiting();
                    addMessage({ text: "连接已中断，可以稍后重试上一条问题。" }, "bot", true);
                }
                reconnectTimer = window.setTimeout(connectSocket, 1800);
            };

            socket.onerror = () => {
                setStatus("error", "连接异常");
            };
        }

        async function loadHistory(showState = true) {
            if (showState) historyState.textContent = "加载中";
            try {
                const response = await fetch(`/api/tracker/${encodeURIComponent(sessionId)}/full`, { cache: "no-store" });
                if (!response.ok) throw new Error("history failed");
                const data = await response.json();
                const events = Array.isArray(data.events) ? data.events : [];
                if (data.slots && data.slots.user_id !== undefined && data.slots.user_id !== null) {
                    currentUserId = String(data.slots.user_id);
                    updateUserLabel();
                }
                if (!events.length) {
                    if (showState) historyState.textContent = "无历史";
                    return;
                }

                messagesEl.innerHTML = "";
                let renderedCount = 0;
                events.forEach((event) => {
                    if (event.event === "user") {
                        const text = event.text || "";
                        if (isControlPayload(text)) return;
                        addMessage({ text, timestamp: event.timestamp }, "user", false, false);
                        renderedCount += 1;
                    } else if (event.event === "bot") {
                        const message = normalizeHistoryBotMessage(event);
                        addMessage(message, "bot", false, false);
                        renderedCount += 1;
                    }
                });
                if (!renderedCount) {
                    addWelcome();
                }
                messagesEl.scrollTop = messagesEl.scrollHeight;
                historyState.textContent = renderedCount ? `${renderedCount} 条` : "无历史";
            } catch (error) {
                historyState.textContent = "加载失败";
            }
        }

        function isControlPayload(text) {
            return String(text || "").trim().startsWith("/SetSlots(");
        }

        function sendCurrentInput() {
            const text = input.value.trim();
            if (!text || awaiting) return;
            sendText(text);
        }

        async function sendText(text, displayText) {
            const question = String(text || "").trim();
            if (!question || awaiting) return;
            const controlPayload = isControlPayload(question);

            lastQuestion = controlPayload ? "" : question;
            retryBtn.disabled = true;
            addMessage({ text: displayText || question }, "user");
            input.value = "";
            beginAwaiting();

            if (!controlPayload && socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    type: "message",
                    sender_id: sessionId,
                    message: question
                }));
                return;
            }

            try {
                const response = await fetch("/api/messages", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        sender: sessionId,
                        message: question,
                        metadata: {
                            source: "chat_page",
                            control_payload: controlPayload
                        }
                    })
                });
                if (!response.ok) throw new Error(await response.text());
                const messages = await response.json();
                finishAwaiting();
                if (Array.isArray(messages) && messages.length) {
                    messages.forEach((message) => addMessage(normalizeBotMessage(message), "bot"));
                } else {
                    addMessage({ text: "本次没有返回可展示的回复，请换一种问法再试。" }, "bot", true);
                }
                connectSocket();
            } catch (error) {
                finishAwaiting();
                addMessage({ text: "发送失败，请检查服务状态后重试。" }, "bot", true);
                retryBtn.disabled = false;
            }
        }

        function beginAwaiting() {
            awaiting = true;
            sendBtn.disabled = true;
            input.disabled = true;
            composerStatus.textContent = "正在查询知识库";
            pendingEl = addPendingMessage();

            noticeTimer = window.setTimeout(() => {
                if (awaiting) composerStatus.textContent = "仍在处理，请稍候";
            }, REQUEST_NOTICE_MS);

            timeoutTimer = window.setTimeout(() => {
                if (!awaiting) return;
                finishAwaiting();
                addMessage({ text: "本次请求等待时间过长，可以稍后重试上一条问题。" }, "bot", true);
                retryBtn.disabled = false;
            }, REQUEST_TIMEOUT_MS);
        }

        function finishAwaiting() {
            awaiting = false;
            sendBtn.disabled = false;
            input.disabled = false;
            composerStatus.textContent = "";
            retryBtn.disabled = !lastQuestion;
            if (noticeTimer) window.clearTimeout(noticeTimer);
            if (timeoutTimer) window.clearTimeout(timeoutTimer);
            noticeTimer = null;
            timeoutTimer = null;
            if (pendingEl) {
                pendingEl.remove();
                pendingEl = null;
            }
        }

        function addPendingMessage() {
            const item = document.createElement("article");
            item.className = "message bot";

            const avatar = document.createElement("div");
            avatar.className = "avatar";
            avatar.textContent = "客";

            const body = document.createElement("div");
            body.className = "message-body";

            const bubble = document.createElement("div");
            bubble.className = "bubble";
            bubble.innerHTML = '<span class="typing-dots" aria-label="正在输入"><span></span><span></span><span></span></span>';

            const time = document.createElement("div");
            time.className = "message-time";
            time.textContent = formatTime();

            body.appendChild(bubble);
            body.appendChild(time);
            item.appendChild(avatar);
            item.appendChild(body);
            messagesEl.appendChild(item);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return item;
        }

        function startNewSession() {
            finishAwaiting();
            sessionId = makeSessionId();
            localStorage.setItem(STORAGE_KEY, sessionId);
            updateSessionLabels();
            historyState.textContent = "无历史";
            messagesEl.innerHTML = "";
            addWelcome("新会话已开始", "你可以继续咨询产品信息、配置参数或服务问题。");
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: "connect", session_id: sessionId }));
                applyCurrentUserId();
            } else {
                connectSocket();
            }
            input.focus();
        }

        async function clearCurrentSession() {
            if (!window.confirm("确定清空当前会话吗？")) return;
            finishAwaiting();
            try {
                const response = await fetch(`/api/sessions/${encodeURIComponent(sessionId)}/reset`, { method: "POST" });
                if (!response.ok) throw new Error("reset failed");
                messagesEl.innerHTML = "";
                addWelcome("当前会话已清空", "你可以重新开始提问。");
                historyState.textContent = "无历史";
                showToast("当前会话已清空");
            } catch (error) {
                messagesEl.innerHTML = "";
                addWelcome("本地对话已清空", "服务端清空失败，请稍后再试。");
                historyState.textContent = "清空失败";
                showToast("服务端清空失败");
            }
            input.focus();
        }

        function addWelcome(title, text) {
            const welcome = document.createElement("section");
            welcome.className = "welcome";
            const h2 = document.createElement("h2");
            h2.textContent = title || "智能客服已就绪";
            const p = document.createElement("p");
            p.textContent = text || "你可以咨询产品介绍、配置参数、使用场景和售后服务等问题。";
            welcome.appendChild(h2);
            welcome.appendChild(p);
            messagesEl.appendChild(welcome);
        }

        function addMessage(message, role, isError = false, scroll = true) {
            const item = document.createElement("article");
            item.className = `message ${role}${isError ? " error" : ""}`;

            const avatar = document.createElement("div");
            avatar.className = "avatar";
            avatar.textContent = role === "user" ? "我" : "客";

            const body = document.createElement("div");
            body.className = "message-body";

            const bubble = document.createElement("div");
            bubble.className = "bubble";
            bubble.textContent = message.text || "";
            body.appendChild(bubble);

            if (role === "bot") {
                const actions = buildBotActions(message);
                if (actions) body.appendChild(actions);

                const meta = buildMeta(message);
                if (meta) body.appendChild(meta);

                const quickReplies = buildQuickReplies(message.buttons);
                if (quickReplies) body.appendChild(quickReplies);
            }

            const time = document.createElement("div");
            time.className = "message-time";
            time.textContent = formatTime(message.timestamp);
            body.appendChild(time);

            item.appendChild(avatar);
            item.appendChild(body);
            messagesEl.appendChild(item);
            if (scroll) messagesEl.scrollTop = messagesEl.scrollHeight;
            return item;
        }

        function buildBotActions(message) {
            const text = String(message.text || "");
            const hasText = text.trim().length > 0;
            if (!hasText && !lastQuestion) return null;

            const row = document.createElement("div");
            row.className = "message-actions";

            if (hasText) {
                const copy = document.createElement("button");
                copy.type = "button";
                copy.className = "mini-button";
                copy.textContent = "复制";
                copy.addEventListener("click", async () => {
                    try {
                        await navigator.clipboard.writeText(text);
                        showToast("已复制回答");
                    } catch (error) {
                        showToast("复制失败");
                    }
                });
                row.appendChild(copy);
            }

            if (lastQuestion) {
                const retry = document.createElement("button");
                retry.type = "button";
                retry.className = "mini-button";
                retry.textContent = "重问";
                retry.addEventListener("click", () => {
                    if (!awaiting) sendText(lastQuestion);
                });
                row.appendChild(retry);
            }

            return row.children.length ? row : null;
        }

        function buildQuickReplies(buttons) {
            if (!Array.isArray(buttons) || !buttons.length) return null;
            const wrap = document.createElement("div");
            wrap.className = "quick-replies";
            buttons.forEach((button) => {
                const title = button && (button.title || button.text || button.label);
                if (!title) return;
                const payload = button.payload || title;
                const item = document.createElement("button");
                item.type = "button";
                item.className = "quick-reply";
                item.textContent = title;
                item.addEventListener("click", () => sendText(payload, title));
                wrap.appendChild(item);
            });
            return wrap.children.length ? wrap : null;
        }

        function buildMeta(message) {
            const wrapper = document.createElement("div");
            wrapper.className = "meta-block";
            let hasContent = false;

            const imageUrls = normalizeImageUrls(message);
            if (imageUrls.length) {
                const images = document.createElement("div");
                images.className = "images";
                imageUrls.slice(0, 6).forEach((url, index) => {
                    const link = document.createElement("a");
                    link.href = toImageSrc(url);
                    link.className = "image-link";
                    link.target = "_blank";
                    link.rel = "noopener noreferrer";
                    const img = document.createElement("img");
                    img.src = toImageSrc(url);
                    img.alt = `相关图片 ${index + 1}`;
                    img.loading = "lazy";
                    img.referrerPolicy = "no-referrer";
                    img.addEventListener("error", () => {
                        link.classList.add("image-missing");
                    });
                    link.appendChild(img);
                    const fallback = document.createElement("span");
                    fallback.className = "image-fallback";
                    fallback.textContent = "图片暂时无法加载，点击打开原图";
                    link.appendChild(fallback);
                    images.appendChild(link);
                });
                wrapper.appendChild(images);
                hasContent = true;
            }

            if (Array.isArray(message.citations) && message.citations.length) {
                const citations = document.createElement("div");
                citations.className = "citations";
                message.citations.slice(0, 6).forEach((source, index) => {
                    const citation = document.createElement("div");
                    citation.className = "citation";

                    const title = document.createElement("div");
                    title.className = "citation-title";

                    const idx = document.createElement("span");
                    idx.className = "citation-index";
                    idx.textContent = `[${source.index || index + 1}]`;
                    title.appendChild(idx);

                    const name = source.title || source.name || `来源 ${index + 1}`;
                    if (source.url) {
                        const link = document.createElement("a");
                        link.href = source.url;
                        link.target = "_blank";
                        link.rel = "noopener noreferrer";
                        link.textContent = name;
                        title.appendChild(link);
                    } else {
                        const strong = document.createElement("strong");
                        strong.textContent = name;
                        title.appendChild(strong);
                    }

                    citation.appendChild(title);
                    const preview = source.preview || source.snippet || source.type || "";
                    if (preview) {
                        const p = document.createElement("p");
                        p.textContent = preview;
                        citation.appendChild(p);
                    }
                    citations.appendChild(citation);
                });
                wrapper.appendChild(citations);
                hasContent = true;
            }

            const details = buildDetails(message);
            if (details) {
                wrapper.appendChild(details);
                hasContent = true;
            }

            return hasContent ? wrapper : null;
        }

        function buildDetails(message) {
            const rows = [
                ["来源", message.source],
                ["会话", message.session_id],
                ["查询类型", message.query_type],
                ["CRAG", stringifyMetaValue(message.crag_decision)]
            ].filter((row) => row[1] !== undefined && row[1] !== null && String(row[1]).trim() !== "");

            if (!rows.length) return null;

            const details = document.createElement("details");
            details.className = "details";
            const summary = document.createElement("summary");
            summary.textContent = "更多信息";
            details.appendChild(summary);

            const grid = document.createElement("div");
            grid.className = "detail-grid";
            rows.forEach(([label, value]) => {
                const key = document.createElement("span");
                key.textContent = label;
                const val = document.createElement("code");
                val.textContent = String(value);
                grid.appendChild(key);
                grid.appendChild(val);
            });
            details.appendChild(grid);
            return details;
        }

        function normalizeBotMessage(message) {
            if (!message || typeof message !== "object") return { text: "" };
            const custom = message.custom && typeof message.custom === "object" ? message.custom : {};
            const rawText = message.text || custom.text || "";
            return {
                ...custom,
                ...message,
                text: stripImageBlock(rawText),
                citations: message.citations || custom.citations || [],
                image_urls: mergeArrays(message.image_urls, custom.image_urls, extractImageUrlsFromText(rawText)),
                buttons: message.buttons || custom.buttons || [],
                source: message.source || custom.source,
                session_id: message.session_id || custom.session_id,
                query_type: message.query_type || custom.query_type,
                crag_decision: message.crag_decision || custom.crag_decision
            };
        }

        function normalizeHistoryBotMessage(event) {
            const data = event.data && typeof event.data === "object" ? event.data : {};
            return normalizeBotMessage({
                ...data,
                ...event,
                text: data.text || event.text || "",
                timestamp: event.timestamp
            });
        }

        function normalizeImageUrls(message) {
            const urls = [];
            if (Array.isArray(message.image_urls)) urls.push(...message.image_urls);
            if (message.image) urls.push(message.image);
            if (message.custom && Array.isArray(message.custom.image_urls)) urls.push(...message.custom.image_urls);
            urls.push(...extractImageUrlsFromText(message.text || ""));
            const seen = new Set();
            return urls
                .map((url) => String(url || "").trim())
                .filter(Boolean)
                .filter((url) => {
                    if (seen.has(url)) return false;
                    seen.add(url);
                    return true;
                });
        }

        function mergeArrays(...items) {
            const merged = [];
            items.forEach((item) => {
                if (Array.isArray(item)) merged.push(...item);
                else if (item) merged.push(item);
            });
            return merged;
        }

        function stripImageBlock(text) {
            return String(text || "")
                .replace(/(?:\r?\n){0,2}【图片】[\s\S]*$/u, "")
                .trimEnd();
        }

        function extractImageUrlsFromText(text) {
            const urls = [];
            const value = String(text || "");
            const imageBlockMatch = value.match(/【图片】([\s\S]*)$/u);
            const searchText = imageBlockMatch ? imageBlockMatch[1] : value;
            searchText.split(/\r?\n/).forEach((line) => {
                const index = line.search(/https?:\/\//i);
                if (index < 0) return;
                const url = cleanImageUrl(line.slice(index));
                if (isLikelyImageUrl(url)) urls.push(url);
            });
            const urlPattern = /https?:\/\/[^\s<>"'，。；、)）\]}】]+/giu;
            for (const match of searchText.matchAll(urlPattern)) {
                const url = cleanImageUrl(match[0]);
                if (isLikelyImageUrl(url)) urls.push(url);
            }
            return urls;
        }

        function cleanImageUrl(url) {
            return String(url || "")
                .trim()
                .replace(/[.,;，。；、)）\]}】]+$/u, "");
        }

        function isLikelyImageUrl(url) {
            if (!url) return false;
            try {
                const parsed = new URL(encodeURI(url), location.href);
                return /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(parsed.pathname);
            } catch (error) {
                return /\.(png|jpe?g|gif|webp|bmp|svg)(?:[?#].*)?$/i.test(url);
            }
        }

        function toImageSrc(url) {
            try {
                return encodeURI(url);
            } catch (error) {
                return url;
            }
        }

        function stringifyMetaValue(value) {
            if (value === undefined || value === null) return "";
            if (typeof value === "string") return value;
            try {
                return JSON.stringify(value);
            } catch (error) {
                return String(value);
            }
        }

        function formatTime(timestamp) {
            const raw = Number(timestamp);
            const date = Number.isFinite(raw)
                ? new Date(raw > 1000000000000 ? raw : raw * 1000)
                : new Date();
            return date.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
        }

        function showToast(text) {
            toast.textContent = text;
            toast.classList.add("show");
            window.clearTimeout(showToast.timer);
            showToast.timer = window.setTimeout(() => {
                toast.classList.remove("show");
            }, 2600);
        }
    </script>
</body>
</html>
